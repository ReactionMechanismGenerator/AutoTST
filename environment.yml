name: tst_env
channels:
  - conda-forge
  - rmg
  - nodefaults
dependencies:
  - python >=3.9,<3.10
  - rmg::rmg == 3.3.0
  - rmg::rmgdatabase == 3.3.0
  - conda-forge::coolprop == 6.7.0
  - conda-forge::ase
  - conda-forge::cclib >=1.6.3,<1.9
  - conda-forge::py3dmol
  - conda-forge::rdkit >=2022.09.1
  - conda-forge::numpy >=1.10.0,<2
  - codecov
  - nose
  - conda-forge::matplotlib >=1.5
  - blas=*=openblas
